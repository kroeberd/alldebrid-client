# AllDebrid-Client — docker-compose.yml
#
# Operating modes:
#
#   1. SQLite (default — no setup needed):
#      docker compose up -d
#
#   2. PostgreSQL external (own instance):
#      Set DB_TYPE=postgres and configure postgres_* in Settings → Database.
#
# ── Unraid note ───────────────────────────────────────────────────────────────
# The app uses network_mode: host to avoid conflicts with Unraid's shfs
# (the FUSE layer that serves /mnt/user shares). Custom Docker bridge networks
# can cause ALL shares to disappear on Unraid — host mode prevents this.
#
# With host mode the app is directly reachable on the host IP:
#   http://<unraid-ip>:8080
#
# ── PostgreSQL with host mode ─────────────────────────────────────────────────
# If you use an external PostgreSQL instance, configure the host IP directly
# in Settings → Database (e.g. 192.168.1.x or the container's IP).
# The internal PostgreSQL profile is not compatible with host network mode.

services:

  alldebrid-client:
    image: kroeberd/alldebrid-client:latest
    build: .
    container_name: alldebrid-client
    restart: unless-stopped
    # host mode: avoids custom bridge networks that conflict with Unraid shfs
    network_mode: host
    volumes:
      - /mnt/user/appdata/alldebrid-client/data:/app/data
      - /mnt/user/appdata/alldebrid-client/config:/app/config
    environment:
      - CONFIG_PATH=/app/config/config.json
      - DB_PATH=/app/data/alldebrid.db
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
