# AllDebrid-Client — docker-compose.yml
#
# Drei Betriebsmodi:
#
#   1. SQLite (Standard — kein Setup nötig):
#      docker compose up -d
#
#   2. PostgreSQL intern (beide Container im selben Compose-Netzwerk):
#      COMPOSE_PROFILES=postgres docker compose up -d
#      Die Container kommunizieren über das interne "alldebrid-net" Netzwerk.
#      Container-Name "alldebrid-postgres" ist als Hostname auflösbar.
#
#   3. PostgreSQL extern (eigene Instanz):
#      DB_TYPE=postgres + postgres_* in config.json oder Umgebungsvariablen.
#
# WICHTIG für Unraid / Bridge-Modus:
#   Wenn du die Container einzeln (nicht per Compose) betreibst, nutze
#   PostgreSQL extern (Option 3) und trage die IP deines PG-Containers ein.

services:

  # ── Hauptanwendung ─────────────────────────────────────────────────────────
  alldebrid-client:
    image: kroeberd/alldebrid-client:latest
    build: .
    container_name: alldebrid-client
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - CONFIG_PATH=/app/config/config.json
      - DB_PATH=/app/data/alldebrid.db
      - TZ=Europe/Berlin
    networks:
      - alldebrid-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Internes PostgreSQL (Profil: postgres) ─────────────────────────────────
  # Aktivieren: COMPOSE_PROFILES=postgres docker compose up -d
  alldebrid-postgres:
    image: postgres:16-alpine
    container_name: alldebrid-postgres
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: alldebrid
      POSTGRES_USER: alldebrid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alldebrid_internal}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alldebrid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alldebrid -d alldebrid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  alldebrid-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
