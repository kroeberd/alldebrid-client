services:
  alldebrid-client:
    image: kroeberd/alldebrid-client:v0.5.4
    build: .
    container_name: alldebrid-client
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - CONFIG_PATH=/app/config/config.json
      - DB_PATH=/app/data/alldebrid.db
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
