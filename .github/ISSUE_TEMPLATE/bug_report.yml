name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v1.4.0"
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite (default)
        - PostgreSQL
    validations:
      required: true

  - type: dropdown
    id: aria2
    attributes:
      label: aria2 mode
      options:
        - External aria2
        - Built-in aria2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run with LOG_LEVEL=DEBUG and paste the relevant lines.
      render: text

  - type: textarea
    id: config
    attributes:
      label: docker-compose / docker run command
      description: Remove any secrets before pasting.
      render: yaml
