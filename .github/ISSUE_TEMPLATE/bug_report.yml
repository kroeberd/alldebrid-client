name: Bug report
description: Report a reproducible problem in AllDebrid-Client
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail so we can reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps that trigger the problem
      placeholder: |
        1. Open ...
        2. Configure ...
        3. Start ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, traceback output, or screenshots
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Which release or tag are you using?
      placeholder: v0.2.0

  - type: dropdown
    id: install
    attributes:
      label: Installation type
      options:
        - Docker
        - Docker Compose
        - Unraid
        - Manual / local Python
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Unraid version, or browser if relevant
      placeholder: Windows 11 + Docker Desktop 27 / Unraid 7 / Ubuntu 24.04
