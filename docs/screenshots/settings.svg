<svg width="1200" height="750" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1220"/><stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg2)"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="750" fill="#0a0f1c"/>
  <rect x="220" y="0" width="1" height="750" fill="#1e2d45"/>
  <circle cx="36" cy="38" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
  <circle cx="36" cy="38" r="6" fill="#f97316"/>
  <text x="57" y="44" fill="#f0f4f8" font-size="15" font-weight="700">AllDebrid-Client</text>
  <text x="36" y="90" fill="#6b7f99" font-size="13">◉ Dashboard</text>
  <text x="36" y="130" fill="#6b7f99" font-size="13">⊟ Torrents</text>
  <text x="36" y="166" fill="#6b7f99" font-size="13">⊟ Events</text>
  <rect x="8" y="188" width="204" height="36" rx="8" fill="#f97316" opacity="0.15"/>
  <text x="36" y="210" fill="#f97316" font-size="13" font-weight="600">⚙ Settings</text>

  <!-- Header -->
  <text x="248" y="44" fill="#f0f4f8" font-size="20" font-weight="700">Settings</text>

  <!-- Tabs -->
  <rect x="240" y="60" width="940" height="44" rx="8" fill="#0f172a"/>
  <!-- Tab buttons -->
  <rect x="246" y="66" width="90" height="32" rx="6" fill="#f97316" opacity="0.2"/>
  <text x="291" y="86" fill="#f97316" font-size="12" font-weight="600" text-anchor="middle">⚡ General</text>
  <text x="376" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">⬇️ Download</text>
  <text x="466" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">🔔 Discord</text>
  <text x="556" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">🔗 Integrations</text>
  <text x="651" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">🗄️ Database</text>
  <text x="736" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">🚫 Filters</text>
  <text x="816" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">⏱ Polling</text>
  <text x="891" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">💾 Backup</text>
  <text x="966" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">🤖 FlexGet</text>
  <text x="1046" y="86" fill="#6b7f99" font-size="12" text-anchor="middle">📊 Reporting</text>

  <!-- AllDebrid card -->
  <rect x="240" y="116" width="940" height="140" rx="10" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="264" y="143" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="1">🔑 ALLDEBRID</text>
  <rect x="240" y="116" width="940" height="3" rx="2" fill="#f97316" opacity="0.6"/>
  <text x="264" y="174" fill="#6b7f99" font-size="12">API Key</text>
  <rect x="264" y="182" width="700" height="36" rx="8" fill="#0f172a" stroke="#2d3f5e" stroke-width="1"/>
  <text x="284" y="204" fill="#4b5563" font-size="13">••••••••••••••••••••••••••</text>
  <rect x="976" y="182" width="80" height="36" rx="8" fill="#1e40af"/>
  <text x="1016" y="204" fill="white" font-size="13" font-weight="600" text-anchor="middle">Test</text>
  <text x="264" y="240" fill="#6b7f99" font-size="12">Agent Name</text>

  <!-- Folders card -->
  <rect x="240" y="270" width="940" height="230" rx="10" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="264" y="297" fill="#9ca3af" font-size="11" font-weight="700" letter-spacing="1">📁 FOLDERS</text>
  <rect x="240" y="270" width="940" height="3" rx="2" fill="#f59e0b" opacity="0.6"/>
  <text x="264" y="328" fill="#6b7f99" font-size="12">Watch Folder</text>
  <rect x="264" y="336" width="800" height="36" rx="8" fill="#0f172a" stroke="#2d3f5e" stroke-width="1"/>
  <text x="284" y="358" fill="#9ca3af" font-size="13">/app/data/watch</text>
  <text x="264" y="400" fill="#6b7f99" font-size="12">Processed Folder</text>
  <rect x="264" y="408" width="800" height="36" rx="8" fill="#0f172a" stroke="#2d3f5e" stroke-width="1"/>
  <text x="284" y="430" fill="#9ca3af" font-size="13">/app/data/processed</text>
  <text x="264" y="462" fill="#6b7f99" font-size="12">Download Folder</text>
  <rect x="264" y="470" width="800" height="36" rx="8" fill="#0f172a" stroke="#2d3f5e" stroke-width="1"/>
  <text x="284" y="492" fill="#9ca3af" font-size="13">/download</text>

  <!-- Save bar -->
  <rect x="240" y="640" width="940" height="60" rx="10" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="264" y="674" fill="#6b7f99" font-size="12">Settings are applied immediately after saving.</text>
  <rect x="800" y="652" width="110" height="36" rx="8" fill="#1e2d45"/>
  <text x="855" y="674" fill="#9ca3af" font-size="12" text-anchor="middle">🔔 Test Discord</text>
  <rect x="920" y="652" width="110" height="36" rx="8" fill="#1e2d45"/>
  <text x="975" y="674" fill="#9ca3af" font-size="12" text-anchor="middle">🔑 Test AllDebrid</text>
  <rect x="1040" y="652" width="128" height="36" rx="8" fill="#f97316"/>
  <text x="1104" y="674" fill="white" font-size="13" font-weight="700" text-anchor="middle">💾 Save Settings</text>
